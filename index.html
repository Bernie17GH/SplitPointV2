<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <title>SplitPoint</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Apply display prefs before React mounts to prevent flash -->
    <script>
      try {
        if (localStorage.getItem('sp_dark') === 'true') document.documentElement.classList.add('dark')
        if (localStorage.getItem('sp_compact') === 'true') document.documentElement.classList.add('compact')
      } catch (_) {}
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
